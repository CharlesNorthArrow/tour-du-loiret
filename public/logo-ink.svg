  <!-- flèche nord -->
  <path d="M 100 47 L 91 94 L 100 89 Z" fill="#101816"/>
  <path d="M 100 47 L 109 94 L 100 89 Z" fill="none" stroke="#101816" stroke-width="2" stroke-linejoin="round"/>
