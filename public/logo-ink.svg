<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="Tour du Loiret — Grand Départ Louzouer MMXXVI">
  <circle cx="100" cy="100" r="100" fill="#F2EFE6"/>
  <defs>
    <path id="arc-top-ink" d="M 17 100 A 83 83 0 0 1 183 100" fill="none"/>
    <path id="arc-bottom-ink" d="M 17 100 A 83 83 0 0 0 183 100" fill="none"/>
